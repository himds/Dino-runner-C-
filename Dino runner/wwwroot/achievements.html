<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino Runner - Succès</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="page-header">
      <div>
        <h1 class="page-title">Dino Runner</h1>
        <p class="page-subtitle">Vitrine des succès · vois combien d'étapes importantes tu as déjà débloquées.</p>
      </div>
      <span class="status-pill" id="user-info">Chargement des informations du joueur...</span>
    </header>

    <nav class="panel nav">
      <div class="nav-links">
        <a class="nav-link" href="index.html">Jeu</a>
        <a class="nav-link active" href="achievements.html">Succès</a>
        <a class="nav-link" href="shop.html">Boutique</a>
      </div>
      <div class="nav-actions">
        <button class="button button-secondary" onclick="logout()">Se déconnecter</button>
      </div>
    </nav>

    <section class="panel">
      <h2 class="card-title">Tous les succès</h2>
      <p class="page-subtitle">Cette étape affiche déjà les cartes de base ; le tri, les statistiques et la date de déblocage peuvent être ajoutés ensuite.</p>
      <div id="achievements" class="grid achievement-grid"></div>
    </section>
  </div>

  <script>
    const api = async (path, options) => {
      const response = await fetch(path, { headers: { "Content-Type": "application/json" }, ...options });
      const data = await response.json().catch(() => null);
      if (!response.ok) throw data || { message: 'Échec de la requête' };
      return data;
    };

    let userId = null;
    let coins = 0;

    function initUser() {
      const stored = localStorage.getItem('dino_user');
      if (!stored) {
        window.location.href = 'login.html';
        return;
      }
      const obj = JSON.parse(stored);
      userId = obj.id;
      coins = obj.coins || 0;
      document.getElementById('user-info').textContent = `Joueur #${userId} / ${coins} pièces`;
    }

    function logout() {
      localStorage.removeItem('dino_user');
      window.location.href = 'login.html';
    }

    async function loadAchievements() {
      const all = await api('/api/achievements');
      const unlocked = await api(`/api/achievements/user/${userId}`);
      const unlockedSet = new Set(unlocked.map(a => a.achievementId));
      const list = document.getElementById('achievements');
      list.innerHTML = '';

      if (!all.length) {
        list.innerHTML = '<div class="empty-state">Aucun succès n’est défini pour le moment.</div>';
        return;
      }

      all.forEach(a => {
        const done = unlockedSet.has(a.id);
        const card = document.createElement('article');
        card.className = `card achievement-card ${done ? 'unlocked' : 'locked'}`;
        card.innerHTML = `
          <h3 class="card-title">${done ? '🏆' : '🔒'} ${a.title}</h3>
          <div class="card-meta">Condition : ${a.condition}</div>
          <div class="card-price">${done ? 'Débloqué' : 'Verrouillé'}</div>
        `;
        list.appendChild(card);
      });
    }

    (async function init() {
      initUser();
      await loadAchievements();
    })();
  </script>
</body>
</html>
