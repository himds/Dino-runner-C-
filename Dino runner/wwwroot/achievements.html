<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino Runner - 成就</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="page-header">
      <div>
        <h1 class="page-title">Dino Runner</h1>
        <p class="page-subtitle">成就展柜 · 看看你已经解锁了多少里程碑。</p>
      </div>
      <span class="status-pill" id="user-info">玩家信息加载中...</span>
    </header>

    <nav class="panel nav">
      <div class="nav-links">
        <a class="nav-link" href="index.html">游戏</a>
        <a class="nav-link active" href="achievements.html">成就</a>
        <a class="nav-link" href="shop.html">商城</a>
      </div>
      <div class="nav-actions">
        <button class="button button-secondary" onclick="logout()">退出登录</button>
      </div>
    </nav>

    <section class="panel">
      <h2 class="card-title">全部成就</h2>
      <p class="page-subtitle">先完成统一卡片风格和基础展示，下一步再补筛选、统计和解锁时间。</p>
      <div id="achievements" class="grid achievement-grid"></div>
    </section>
  </div>

  <script>
    const api = async (path, options) => {
      const response = await fetch(path, { headers: { "Content-Type": "application/json" }, ...options });
      const data = await response.json().catch(() => null);
      if (!response.ok) throw data || { message: '请求失败' };
      return data;
    };

    let userId = null;
    let coins = 0;

    function initUser() {
      const stored = localStorage.getItem('dino_user');
      if (!stored) {
        window.location.href = 'login.html';
        return;
      }
      const obj = JSON.parse(stored);
      userId = obj.id;
      coins = obj.coins || 0;
      document.getElementById('user-info').textContent = `玩家 #${userId} / 金币 ${coins}`;
    }

    function logout() {
      localStorage.removeItem('dino_user');
      window.location.href = 'login.html';
    }

    async function loadAchievements() {
      const all = await api('/api/achievements');
      const unlocked = await api(`/api/achievements/user/${userId}`);
      const unlockedSet = new Set(unlocked.map(a => a.achievementId));
      const list = document.getElementById('achievements');
      list.innerHTML = '';

      if (!all.length) {
        list.innerHTML = '<div class="empty-state">暂时还没有成就定义。</div>';
        return;
      }

      all.forEach(a => {
        const done = unlockedSet.has(a.id);
        const card = document.createElement('article');
        card.className = `card achievement-card ${done ? 'unlocked' : 'locked'}`;
        card.innerHTML = `
          <h3 class="card-title">${done ? '🏆' : '🔒'} ${a.title}</h3>
          <div class="card-meta">条件：${a.condition}</div>
          <div class="card-price">${done ? '已解锁' : '未解锁'}</div>
        `;
        list.appendChild(card);
      });
    }

    (async function init() {
      initUser();
      await loadAchievements();
    })();
  </script>
</body>
</html>
