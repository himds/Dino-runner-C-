<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino Runner - Boutique</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="page-header">
      <div>
        <h1 class="page-title">Dino Runner</h1>
        <p class="page-subtitle">Boutique · équipe ton Dino pour être plus à l'aise à la prochaine partie.</p>
      </div>
      <span class="status-pill" id="user-info">Chargement des informations du joueur...</span>
    </header>

    <nav class="panel nav">
      <div class="nav-links">
        <a class="nav-link" href="index.html">Jeu</a>
        <a class="nav-link" href="achievements.html">Succès</a>
        <a class="nav-link active" href="shop.html">Boutique</a>
      </div>
      <div class="nav-actions">
        <button class="button button-secondary" onclick="logout()">Se déconnecter</button>
      </div>
    </nav>

    <section class="panel">
      <div id="shop-status" class="alert"></div>

      <div class="stats-row" style="margin-bottom: 16px;">
        <div class="stat-box">
          <div class="stat-label">Pièces actuelles</div>
          <div class="stat-value" id="coins-display">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Objets possédés</div>
          <div class="stat-value" id="owned-count">0</div>
        </div>
      </div>

      <h2 class="card-title">Liste des objets</h2>
      <p class="page-subtitle">Une fois l'achat effectué, l'objet s'activera automatiquement sur la page de jeu.</p>
      <div id="shop" class="grid shop-grid"></div>
    </section>
  </div>

  <script>
    const api = async (path, options) => {
      const response = await fetch(path, { headers: { "Content-Type": "application/json" }, ...options });
      const data = await response.json().catch(() => null);
      if (!response.ok) throw data || { message: 'Échec de la requête' };
      return data;
    };

    let userId = null;
    let coins = 0;

    function setStatus(message, type = 'info') {
      const el = document.getElementById('shop-status');
      el.className = `alert alert-${type} show`;
      el.textContent = message;
    }

    function updateUserInfo() {
      document.getElementById('user-info').textContent = `Joueur #${userId} / ${coins} pièces`;
      document.getElementById('coins-display').textContent = coins;
    }

    function initUser() {
      const stored = localStorage.getItem('dino_user');
      if (!stored) {
        window.location.href = 'login.html';
        return;
      }
      const obj = JSON.parse(stored);
      userId = obj.id;
      coins = obj.coins || 0;
      updateUserInfo();
    }

    function logout() {
      localStorage.removeItem('dino_user');
      window.location.href = 'login.html';
    }

    async function loadShop() {
      const container = document.getElementById('shop');
      container.innerHTML = '';

      const [items, owned] = await Promise.all([
        api('/api/shop/items'),
        api(`/api/shop/user/${userId}`)
      ]);

      const ownedSet = new Set(owned.map(o => o.shopItemId));
      document.getElementById('owned-count').textContent = owned.length;

      if (!items.length) {
        container.innerHTML = '<div class="empty-state">La boutique ne contient aucun objet pour le moment.</div>';
        return;
      }

      const iconMap = {
        1: '🦘',
        2: '🐢',
        3: '🛡️'
      };

      items.forEach(item => {
        const has = ownedSet.has(item.id);
        const insufficient = !has && coins < item.price;
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-meta">${iconMap[item.id] || '🎒'} Objet</div>
          <h3 class="card-title">${item.name}</h3>
          <div class="card-meta">${item.description || 'Aucune description'}</div>
          <div class="card-price">💰 ${item.price}</div>
          <div class="card-actions">
            <button class="button ${has ? 'button-ghost' : 'button-primary'}" ${has || insufficient ? 'disabled' : ''}>
              ${has ? 'Déjà possédé' : insufficient ? 'Pièces insuffisantes' : `Acheter (${item.price})`}
            </button>
          </div>
        `;

        const button = card.querySelector('button');
        if (!has && !insufficient) {
          button.onclick = async () => {
            button.disabled = true;
            button.textContent = 'Achat en cours...';
            try {
              const res = await api('/api/shop/purchase', {
                method: 'POST',
                body: JSON.stringify({ userId, shopItemId: item.id })
              });
              coins = res.coins;
              localStorage.setItem('dino_user', JSON.stringify({ id: userId, coins }));
              updateUserInfo();
              setStatus(`Achat réussi : ${item.name}. Va sur la page de jeu pour voir l'effet.`, 'success');
              await loadShop();
            } catch (e) {
              setStatus(e.message || "Échec de l'achat", 'error');
              await loadShop();
            }
          };
        }

        container.appendChild(card);
      });
    }

    (async function init() {
      initUser();
      await loadShop();
      setStatus('Boutique chargée, choisis l’objet qui te convient.', 'info');
    })();
  </script>
</body>
</html>
