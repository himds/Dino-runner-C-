<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino Runner - 商城</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="page-header">
      <div>
        <h1 class="page-title">Dino Runner</h1>
        <p class="page-subtitle">商城 · 给你的 Dino 添点装备，下一局更有底气。</p>
      </div>
      <span class="status-pill" id="user-info">玩家信息加载中...</span>
    </header>

    <nav class="panel nav">
      <div class="nav-links">
        <a class="nav-link" href="index.html">游戏</a>
        <a class="nav-link" href="achievements.html">成就</a>
        <a class="nav-link active" href="shop.html">商城</a>
      </div>
      <div class="nav-actions">
        <button class="button button-secondary" onclick="logout()">退出登录</button>
      </div>
    </nav>

    <section class="panel">
      <div id="shop-status" class="alert"></div>

      <div class="stats-row" style="margin-bottom: 16px;">
        <div class="stat-box">
          <div class="stat-label">当前金币</div>
          <div class="stat-value" id="coins-display">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">已拥有道具</div>
          <div class="stat-value" id="owned-count">0</div>
        </div>
      </div>

      <h2 class="card-title">道具列表</h2>
      <p class="page-subtitle">购买成功后，道具会在游戏页自动生效。</p>
      <div id="shop" class="grid shop-grid"></div>
    </section>
  </div>

  <script>
    const api = async (path, options) => {
      const response = await fetch(path, { headers: { "Content-Type": "application/json" }, ...options });
      const data = await response.json().catch(() => null);
      if (!response.ok) throw data || { message: '请求失败' };
      return data;
    };

    let userId = null;
    let coins = 0;

    function setStatus(message, type = 'info') {
      const el = document.getElementById('shop-status');
      el.className = `alert alert-${type} show`;
      el.textContent = message;
    }

    function updateUserInfo() {
      document.getElementById('user-info').textContent = `玩家 #${userId} / 金币 ${coins}`;
      document.getElementById('coins-display').textContent = coins;
    }

    function initUser() {
      const stored = localStorage.getItem('dino_user');
      if (!stored) {
        window.location.href = 'login.html';
        return;
      }
      const obj = JSON.parse(stored);
      userId = obj.id;
      coins = obj.coins || 0;
      updateUserInfo();
    }

    function logout() {
      localStorage.removeItem('dino_user');
      window.location.href = 'login.html';
    }

    async function loadShop() {
      const container = document.getElementById('shop');
      container.innerHTML = '';

      const [items, owned] = await Promise.all([
        api('/api/shop/items'),
        api(`/api/shop/user/${userId}`)
      ]);

      const ownedSet = new Set(owned.map(o => o.shopItemId));
      document.getElementById('owned-count').textContent = owned.length;

      if (!items.length) {
        container.innerHTML = '<div class="empty-state">商城暂时没有商品。</div>';
        return;
      }

      const iconMap = {
        1: '🦘',
        2: '🐢',
        3: '🛡️'
      };

      items.forEach(item => {
        const has = ownedSet.has(item.id);
        const insufficient = !has && coins < item.price;
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-meta">${iconMap[item.id] || '🎒'} 道具</div>
          <h3 class="card-title">${item.name}</h3>
          <div class="card-meta">${item.description || '暂无描述'}</div>
          <div class="card-price">💰 ${item.price}</div>
          <div class="card-actions">
            <button class="button ${has ? 'button-ghost' : 'button-primary'}" ${has || insufficient ? 'disabled' : ''}>
              ${has ? '已拥有' : insufficient ? '金币不足' : `购买（${item.price}）`}
            </button>
          </div>
        `;

        const button = card.querySelector('button');
        if (!has && !insufficient) {
          button.onclick = async () => {
            button.disabled = true;
            button.textContent = '购买中...';
            try {
              const res = await api('/api/shop/purchase', {
                method: 'POST',
                body: JSON.stringify({ userId, shopItemId: item.id })
              });
              coins = res.coins;
              localStorage.setItem('dino_user', JSON.stringify({ id: userId, coins }));
              updateUserInfo();
              setStatus(`购买成功：${item.name}，去游戏页就能看到效果。`, 'success');
              await loadShop();
            } catch (e) {
              setStatus(e.message || '购买失败', 'error');
              await loadShop();
            }
          };
        }

        container.appendChild(card);
      });
    }

    (async function init() {
      initUser();
      await loadShop();
      setStatus('商城加载完成，挑一个顺手的道具吧。', 'info');
    })();
  </script>
</body>
</html>
