<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino Runner - 游戏</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f7f7f7; }
    h1 { margin-bottom: 0; }
    .panel { background: #fff; padding: 12px; margin: 12px 0; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    button { padding: 6px 12px; margin-left: 4px; cursor: pointer; }
    canvas { background: #fff; border: 1px solid #ccc; display: block; margin-top: 10px; }
    .nav a { margin-right: 10px; }
  </style>
</head>
<body>
  <h1>Dino Runner - 游戏</h1>
  <div class="panel nav">
    <a href="login.html">登录</a>
    <a href="achievements.html">成就</a>
    <a href="shop.html">商城</a>
    <span id="user-info"></span>
  </div>

  <div class="panel">
    <button onclick="startGame()">开始游戏</button>
    <span id="game-status"></span>
    <canvas id="game" width="800" height="200"></canvas>
  </div>

  <script>
    const api = (path, options) =>
      fetch(path, { headers: { "Content-Type": "application/json" }, ...options })
        .then(r => r.ok ? r.json() : r.json().then(e => Promise.reject(e)));

    let userId = null;
    let coins = 0;
    let hasDoubleJump = false; // 二段跳开关
    let speedReduction = 1;    // 速度缩减系数
    let hasShield = false;     // 护盾开关
    let jumpCount = 0;         // 记录当前跳跃次数

    async function initUser() {
      const stored = localStorage.getItem('dino_user');
      if (!stored) {
        window.location.href = 'login.html';
        return;
      }
      const obj = JSON.parse(stored);
      userId = obj.id;
      coins = obj.coins || 0;
      try {
        const userItems = await api(`/api/Shop/user/${userId}`);
        const itemIds = userItems.map(i => i.shopItemId);
        
        // 根据 ID 激活功能
        hasDoubleJump = itemIds.includes(1); // 1 = Double Jump
        speedReduction = itemIds.includes(2) ? 0.7 : 1; // 2 = Slow Speed
        hasShield = itemIds.includes(3);     // 3 = Shield
        
        console.log("已激活道具:", { hasDoubleJump, speedReduction, hasShield });
      } catch (e) { console.error("获取道具失败", e); }
      document.getElementById('user-info').textContent = `玩家 #${userId} / 金币 ${coins}`;
      }


    // Game logic
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let running = false;
    let dinoY = 150, velocity = 0;
    const gravity = 0.5, jump = -10;
    let obstacles = [];
    let frame = 0;
    let score = 0;

    document.addEventListener('keydown', e => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (!running) startGame();
        const maxJumps = hasDoubleJump ? 2 : 1;
          if (dinoY >= 150) {
              velocity = jump;
              jumpCount = 1;
          } else if (jumpCount < maxJumps) {
              velocity = jump;
              jumpCount++;
          }
      }
    });

    function startGame() {
      if (!userId) return window.location.href = 'login.html';
      running = true;
      dinoY = 150;
      velocity = 0;
      obstacles = [];
      frame = 0;
      score = 0;
      document.getElementById('game-status').textContent = '游戏中...';
      requestAnimationFrame(loop);
    }

    function loop() {
      if (!running) return;
      frame++;
      score += 1;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // ground
      ctx.fillStyle = '#555';
      ctx.fillRect(0, 180, canvas.width, 2);

      // dino
      velocity += gravity;
      dinoY += velocity;
      if (dinoY > 150) { dinoY = 150; velocity = 0; }
      ctx.fillStyle = '#2c7';
      ctx.fillRect(50, dinoY, 30, 30);

      // obstacles
      if (frame % 90 === 0) {
        obstacles.push({ x: canvas.width, w: 20 + Math.random() * 20 });
      }
      ctx.fillStyle = '#c33';
      for (const obs of obstacles) {
          obs.x -= 4 + Math.min(6, score / 500) * speedReduction;
          ctx.fillRect(obs.x, 160, obs.w, 20);
      }
      obstacles = obstacles.filter(o => o.x + o.w > 0);

      // collision
      for (let i = obstacles.length - 1; i >= 0; i--) {
          const obs = obstacles[i];
          if (50 < obs.x + obs.w && 50 + 30 > obs.x && dinoY + 30 > 160) {
              if (hasShield) { // 如果有护盾
                  hasShield = false; // 消耗护盾
                  obstacles.splice(i, 1); // 移除该障碍物
                  console.log("护盾抵挡了一次碰撞！");
                  continue;
              }
              gameOver();
              return;
          }
      }

      // score text
      ctx.fillStyle = '#000';
      ctx.fillText(`Score: ${score}`, 10, 20);

      requestAnimationFrame(loop);
    }

    async function gameOver() {
      running = false;
      document.getElementById('game-status').textContent = `游戏结束，分数 ${score}`;
      try {
        const res = await api('/api/scores', { method: 'POST', body: JSON.stringify({ userId, value: score }) });
        coins = res.totalCoins;
        localStorage.setItem('dino_user', JSON.stringify({ id: userId, coins }));
        document.getElementById('user-info').textContent = `玩家 #${userId} / 金币 ${coins}`;
        alert(`分数上传成功，获得金币 ${res.newCoins}` + (res.unlockedAchievementIds?.length ? `，解锁成就：${res.unlockedAchievementIds.join(',')}` : ''));
      } catch (e) {
        alert(e.message || '上传分数失败');
      }
    }

    initUser();
  </script>
</body>
</html>
