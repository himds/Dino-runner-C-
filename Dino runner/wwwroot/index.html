<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino Runner - 游戏</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="page-header">
      <div>
        <h1 class="page-title">Dino Runner</h1>
        <p class="page-subtitle">跳起来，躲开障碍，看看这次能跑多远。</p>
      </div>
      <span class="status-pill" id="user-info">玩家信息加载中...</span>
    </header>

    <nav class="panel nav">
      <div class="nav-links">
        <a class="nav-link active" href="index.html">游戏</a>
        <a class="nav-link" href="achievements.html">成就</a>
        <a class="nav-link" href="shop.html">商城</a>
      </div>
      <div class="nav-actions">
        <button class="button button-secondary" onclick="logout()">退出登录</button>
      </div>
    </nav>

    <section class="hero">
      <div class="panel hero-card">
        <div class="inline-actions" style="justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 16px; flex-wrap: wrap;">
          <div>
            <h2 class="card-title">开始一局</h2>
            <p class="page-subtitle">按空格跳跃，躲避障碍物。已购买的道具会在这里自动生效。</p>
          </div>
          <button class="button button-primary" onclick="startGame()">开始游戏</button>
        </div>

        <div id="game-status" class="alert alert-info show">准备就绪，按下开始或者空格键开跑。</div>

        <div class="stats-row" style="margin-bottom: 12px;">
          <div class="stat-box">
            <div class="stat-label">已激活道具</div>
            <div class="stat-value" id="item-display" style="font-size: 16px;">加载中...</div>
          </div>
        </div>

        <div class="canvas-shell">
          <canvas id="game" width="800" height="200"></canvas>
        </div>
      </div>

      <aside class="panel hero-card">
        <h2 class="card-title">本局状态</h2>
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-label">当前分数</div>
            <div class="stat-value" id="score-display">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">游戏状态</div>
            <div class="stat-value" id="run-display">待开始</div>
          </div>
        </div>
        <p class="page-subtitle" style="margin-top: 14px;">商城道具说明：Double Jump 可二段跳，Slow Speed 会降低障碍速度，Shield 可抵挡一次碰撞。</p>
      </aside>
    </section>
  </div>

  <script>
    const api = async (path, options) => {
      const response = await fetch(path, { headers: { "Content-Type": "application/json" }, ...options });
      const data = await response.json().catch(() => null);
      if (!response.ok) throw data || { message: '请求失败' };
      return data;
    };

    let userId = null;
    let coins = 0;
    let hasDoubleJump = false;
    let speedReduction = 1;
    let hasShield = false;
    let jumpCount = 0;

    function logout() {
      localStorage.removeItem('dino_user');
      window.location.href = 'login.html';
    }

    function setGameStatus(message, type = 'info') {
      const el = document.getElementById('game-status');
      el.className = `alert alert-${type} show`;
      el.textContent = message;
    }

    function updateScoreDisplay() {
      document.getElementById('score-display').textContent = score;
    }

    function updateRunDisplay(text) {
      document.getElementById('run-display').textContent = text;
    }

    function updateUserInfo() {
      document.getElementById('user-info').textContent = `玩家 #${userId} / 金币 ${coins}`;
    }

    function updateItemDisplay() {
      const items = [];
      if (hasDoubleJump) items.push('二段跳');
      if (speedReduction < 1) items.push('减速');
      if (hasShield) items.push('护盾');
      document.getElementById('item-display').textContent = items.length ? items.join(' / ') : '暂无已购道具';
    }

    async function loadOwnedItems() {
      try {
        const userItems = await api(`/api/shop/user/${userId}`);
        const itemIds = userItems.map(i => i.shopItemId);
        hasDoubleJump = itemIds.includes(1);
        speedReduction = itemIds.includes(2) ? 0.7 : 1;
        hasShield = itemIds.includes(3);
        updateItemDisplay();
      } catch (e) {
        hasDoubleJump = false;
        speedReduction = 1;
        hasShield = false;
        updateItemDisplay();
        setGameStatus(e.message || '读取已购道具失败，已按默认模式运行。', 'error');
      }
    }

    async function initUser() {
      const stored = localStorage.getItem('dino_user');
      if (!stored) {
        window.location.href = 'login.html';
        return;
      }
      const obj = JSON.parse(stored);
      userId = obj.id;
      coins = obj.coins || 0;
      updateUserInfo();
      await loadOwnedItems();
    }

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let running = false;
    let dinoY = 150, velocity = 0;
    const gravity = 0.5, jump = -10;
    let obstacles = [];
    let frame = 0;
    let score = 0;

    document.addEventListener('keydown', e => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (!running) startGame();

        const maxJumps = hasDoubleJump ? 2 : 1;
        if (dinoY >= 150) {
          velocity = jump;
          jumpCount = 1;
        } else if (jumpCount < maxJumps) {
          velocity = jump;
          jumpCount++;
        }
      }
    });

    function drawBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, '#dff5ff');
      gradient.addColorStop(0.68, '#f9fcff');
      gradient.addColorStop(0.68, '#f3ede2');
      gradient.addColorStop(1, '#f3ede2');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.arc(120, 48, 18, 0, Math.PI * 2);
      ctx.arc(140, 42, 22, 0, Math.PI * 2);
      ctx.arc(162, 48, 18, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'rgba(153, 169, 181, 0.25)';
      ctx.beginPath();
      ctx.moveTo(520, 180);
      ctx.lineTo(610, 110);
      ctx.lineTo(700, 180);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#7b8794';
      ctx.fillRect(0, 180, canvas.width, 2);
    }

    function startGame() {
      if (!userId) return window.location.href = 'login.html';
      running = true;
      dinoY = 150;
      velocity = 0;
      jumpCount = 0;
      obstacles = [];
      frame = 0;
      score = 0;
      updateScoreDisplay();
      updateRunDisplay('进行中');
      updateItemDisplay();
      setGameStatus('游戏中... 已购道具已自动生效。', 'info');
      requestAnimationFrame(loop);
    }

    function loop() {
      if (!running) return;
      frame++;
      score += 1;
      updateScoreDisplay();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();

      velocity += gravity;
      dinoY += velocity;
      if (dinoY > 150) {
        dinoY = 150;
        velocity = 0;
        jumpCount = 0;
      }
      ctx.fillStyle = '#27ae60';
      ctx.fillRect(50, dinoY, 30, 30);

      if (frame % 90 === 0) {
        obstacles.push({ x: canvas.width, w: 20 + Math.random() * 20 });
      }
      ctx.fillStyle = '#e74c3c';
      for (const obs of obstacles) {
        obs.x -= 4 + Math.min(6, score / 500) * speedReduction;
        ctx.fillRect(obs.x, 160, obs.w, 20);
      }
      obstacles = obstacles.filter(o => o.x + o.w > 0);

      for (let i = obstacles.length - 1; i >= 0; i--) {
        const obs = obstacles[i];
        if (50 < obs.x + obs.w && 50 + 30 > obs.x && dinoY + 30 > 160) {
          if (hasShield) {
            hasShield = false;
            obstacles.splice(i, 1);
            updateItemDisplay();
            setGameStatus('护盾抵挡了一次碰撞，继续冲。', 'success');
            continue;
          }
          gameOver();
          return;
        }
      }

      ctx.fillStyle = '#1f2937';
      ctx.fillText(`Score: ${score}`, 16, 24);
      requestAnimationFrame(loop);
    }

    async function gameOver() {
      running = false;
      updateRunDisplay('已结束');
      setGameStatus(`游戏结束，分数 ${score}`,'error');
      try {
        const res = await api('/api/scores', { method: 'POST', body: JSON.stringify({ userId, value: score }) });
        coins = res.totalCoins;
        localStorage.setItem('dino_user', JSON.stringify({ id: userId, coins }));
        updateUserInfo();
        setGameStatus(`分数上传成功，获得金币 ${res.newCoins}${res.unlockedAchievementIds?.length ? `，解锁成就：${res.unlockedAchievementIds.join(',')}` : ''}`,'success');
        await loadOwnedItems();
      } catch (e) {
        setGameStatus(e.message || '上传分数失败', 'error');
      }
    }

    (async function init() {
      await initUser();
      setGameStatus('商城道具已同步完成，可以开始游戏。', 'info');
    })();
  </script>
</body>
</html>
